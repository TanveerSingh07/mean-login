<div class="container">
  <div class="card">
    
    <h1>PeerConnect</h1>
    <p>{{ isRegister ? 'Create your account' : 'Sign in to your account' }}</p>

    <div *ngIf="error" class="error-box">
      {{ error }}
    </div>

    <!-- Register Fields -->
    <div *ngIf="isRegister">
      <input type="text" name="name" placeholder="Full Name" [(ngModel)]="formData.name">
      <input type="text" name="collegeId" placeholder="College ID" [(ngModel)]="formData.collegeId">
    </div>

    <input type="email" name="email" placeholder="you@college.edu" [(ngModel)]="formData.email">
    <input type="password" name="password" placeholder="••••••••" [(ngModel)]="formData.password">

    <button (click)="isRegister ? handleRegister() : handleLogin()" [disabled]="loading">
      {{ loading ? 'Processing...' : (isRegister ? 'Create Account' : 'Sign In') }}
    </button>

    <div class="divider">OR</div>

    <p>
      {{ isRegister ? 'Already have an account?' : "Don't have an account?" }}
      <span (click)="toggleMode()">
        {{ isRegister ? 'Sign In' : 'Create Account' }}
      </span>
    </p>

  </div>
</div>
