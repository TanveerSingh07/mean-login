<div class="page">

  <div class="card">

    <h1 class="title">PeerConnect</h1>
    <p class="subtitle">
      {{ isRegister ? 'Create your account' : 'Sign in to your account' }}
    </p>

    <div *ngIf="error" class="error-box">
      {{ error }}
    </div>

    <!-- Register fields -->
    <div *ngIf="isRegister">
      <input type="text" placeholder="Full Name" [(ngModel)]="formData.name" />
      <input type="text" placeholder="College ID" [(ngModel)]="formData.collegeId" />
    </div>

    <!-- Common fields -->
    <input type="email" placeholder="you@college.edu" [(ngModel)]="formData.email" />
    <input type="password" placeholder="••••••••" [(ngModel)]="formData.password" />

    <button (click)="isRegister ? handleRegister() : handleLogin()">
      {{ isRegister ? 'Create Account' : 'Sign In' }}
    </button>

    <div class="divider">OR</div>

    <p class="toggle">
      {{ isRegister ? 'Already have an account?' : "Don't have an account?" }}
      <span (click)="toggleMode()">
        {{ isRegister ? 'Sign In' : 'Create Account' }}
      </span>
    </p>

  </div>

</div>
